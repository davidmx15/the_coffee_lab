{% extends 'tienda/base.html' %}

{% block content %}
<h2 class="text-2xl font-bold">Iniciar sesión</h2>

{% if request.GET.next %}
<div class="bg-yellow-100 border-l-4 border-yellow-500 text-yellow-700 p-4 my-4" role="alert">
    <p>⚠️ Debes iniciar sesión para acceder a esa página.</p>
</div>
{% endif %}

<form method="post" class="mt-4">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">Entrar</button>
    <input type="hidden" name="next" value="{{ request.GET.next }}">
</form>
{% endblock %}
